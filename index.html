<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEMA — Catálogo de joyas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Enlace al CSS de Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Librería PhotoSwipe para el visor de fotos con Zoom y Deslizamiento -->
<link rel="stylesheet" href="https://unpkg.com/photoswipe@5.4.3/dist/photoswipe.css">
<style>

  /* Contenedor de variantes de color */
  .card .color-variants{display:flex;gap:8px;padding:8px 20px 0;flex-wrap:wrap;align-items:center;}
  .card .color-label{font-size:11px;color:var(--texto-suave);margin-right:2px;text-transform:uppercase;letter-spacing:0.5px;}
  .card .color-badge{font-size:11px;padding:2px 8px;border:1px solid var(--linea);background:#fff;cursor:pointer;transition:all 0.2s;}
  .card .color-badge.active{border-color:var(--rosa-fuerte);background:var(--rosa);color:var(--rosa-texto);font-weight:500;}
  
  :root{
    --bg:#FFFFFF; --bg-soft:#FBF5F1;
    --rosa:#F3D9DF; --rosa-fuerte:#C97C90; --rosa-texto:#A85A70;
    --oro:#C6A05F; --oro-claro:#E3C48A; --oro-oscuro:#8F7238;
    --texto:#2B2723; --texto-suave:#8A8078; --linea:#EADFD6;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--texto);font-family:'Jost',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Cormorant Garamond',serif;}
  .facet{clip-path:polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);}
  .facet-sm{clip-path:polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);}

  header{padding:64px 24px 40px;text-align:center;background:var(--bg-soft);border-bottom:1px solid var(--linea);}
  .wordmark{font-size:56px;font-style:italic;font-weight:500;letter-spacing:2px;margin:0;color:var(--texto);}
  .wordmark em{color:var(--oro-oscuro);}
  .tagline{color:var(--rosa-texto);font-size:14px;letter-spacing:3px;text-transform:uppercase;margin-top:10px;}

  main{max-width:1180px;margin:0 auto;padding:40px 24px 80px;}
  .toolbar{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;margin-bottom:28px;}
  .toolbar h2{font-size:26px;font-weight:400;font-style:italic;margin:0;color:var(--oro-oscuro);}
  .count{color:var(--texto-suave);font-size:13px;margin-top:4px;}

  button{font-family:'Jost',sans-serif;cursor:pointer;border:1px solid var(--oro);background:transparent;color:var(--oro-oscuro);padding:10px 20px;font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s ease;}
  button:hover{background:var(--oro);color:#fff;}

  .filters{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;gap:14px;background:var(--bg-soft);border:1px solid var(--linea);padding:20px;margin-bottom:32px;}
  .filters label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--texto-suave);margin-bottom:6px;}
  input,select{width:100%;background:#fff;border:1px solid var(--linea);color:var(--texto);padding:10px 12px;font-family:'Jost',sans-serif;font-size:14px;font-weight:300;}
  input:focus,select:focus{outline:none;border-color:var(--rosa-fuerte);}
  .filters-clear{grid-column:1/-1;text-align:right;}
  .filters-clear button{padding:6px 14px;font-size:11px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:26px;}
  .card{background:#fff;border:1px solid var(--linea);position:relative;display:flex;flex-direction:column;transition:border-color .2s ease, transform .2s ease;}
  .card:hover{border-color:var(--rosa-fuerte);transform:translateY(-3px);}
  
  /* Imagen principal del artículo */
  .card .img-wrap{aspect-ratio:1/1;background:var(--bg-soft) center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:var(--texto-suave);font-size:12px;letter-spacing:1px;cursor:pointer;}
  
  /* Miniaturas debajo de la foto principal */
  .card .thumbs-container{display:flex;gap:6px;padding:8px 20px 0;overflow-x:auto;}
  .card .thumb{width:40px;height:40px;border:1px solid var(--linea);background:var(--bg-soft) center/cover no-repeat;cursor:pointer;flex-shrink:0;transition:border-color .2s;}
  .card .thumb:hover, .card .thumb.active{border-color:var(--rosa-fuerte);}

  .card .body{padding:18px 20px 20px;flex:1;display:flex;flex-direction:column;gap:6px;}
  .card .cat{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--rosa-texto);}
  .card h3{margin:2px 0 0;font-size:22px;font-weight:500;color:var(--texto);}
  .card .attrs{font-size:12.5px;color:var(--texto-suave);line-height:1.7;}
  .card .price{margin-top:auto;padding-top:10px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--oro-oscuro);border-top:1px solid var(--linea);}
  .card .destacado{position:absolute;top:12px;left:0;background:var(--rosa-fuerte);color:#fff;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;z-index:2;}
  .card .comprar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;padding:11px 14px;background:var(--oro);color:#fff;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;transition:background .2s ease;}
  .card .comprar:hover{background:var(--oro-oscuro);}
  .card .comprar svg{width:14px;height:14px;flex-shrink:0;}

  .empty{text-align:center;padding:80px 20px;color:var(--texto-suave);border:1px dashed var(--linea);}
  .empty h3{color:var(--texto);font-size:24px;font-weight:400;font-style:italic;margin-bottom:8px;}
  .loading{text-align:center;padding:60px;color:var(--texto-suave);}

  .setup{max-width:560px;margin:60px auto;padding:32px;background:var(--bg-soft);border:1px solid var(--linea);text-align:center;}
  .setup h3{color:var(--oro-oscuro);font-style:italic;margin-top:0;}
  .setup code{background:#fff;border:1px solid var(--linea);padding:2px 6px;font-size:12px;}
  .setup p{color:var(--texto-suave);font-size:13.5px;line-height:1.7;}

  footer{text-align:center;padding:30px;color:var(--texto-suave);font-size:12px;border-top:1px solid var(--linea);}

  @media(max-width:820px){.filters{grid-template-columns:1fr 1fr;} .wordmark{font-size:42px;}}

  /* Fuerza a que el offcanvas se oculte correctamente de inicio y no se muestre al pie de página */
.offcanvas:not(.show) {
  display: none !important;
}
/* ==========================================
     NUEVOS ESTILOS PARA FILAS HORIZONTALES 
     ========================================== */
  .category-row {
    margin-bottom: 40px;
  }
  .category-row h3.category-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-style: italic;
    font-weight: 500;
    color: var(--oro-oscuro);
    margin-bottom: 16px;
    border-bottom: 1px solid var(--linea);
    padding-bottom: 8px;
  }
  .horizontal-scroll-wrapper {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding-bottom: 15px;
    scrollbar-width: none; /* Oculta barra en Firefox */
  }
  .horizontal-scroll-wrapper::-webkit-scrollbar {
    display: none; /* Oculta barra en Chrome/Safari */
  }
  .horizontal-scroll-wrapper .card {
    width: 280px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1 class="wordmark">FE<em>MA</em></h1>
  <div class="tagline">Catálogo de joyería</div>
</header>

<main>
  <div class="toolbar">
    <div>
      <h2>Piezas disponibles</h2>
      <div class="count" id="resultCount">Cargando catálogo…</div>
    </div>
  </div>

  <div class="filters">
    <div><label>Buscar</label><input type="text" id="fSearch" placeholder="Nombre o descripción..."></div>
    <div><label>Categoría</label>
      <select id="fCategoria"><option value="">Todas</option><option>Anillos</option><option>Collares</option><option>Aretes</option><option>Pulseras</option><option>Relojes</option></select>
    </div>
    <div><label>Material</label>
      <select id="fMaterial"><option value="">Todos</option><option>Oro amarillo</option><option>Oro rosa</option><option>Oro blanco</option><option>Plata 925</option><option>Acero quirúrgico</option></select>
    </div>
    <div><label>Piedra</label>
      <select id="fPiedra"><option value="">Todas</option><option>Ninguna</option><option>Diamante</option><option>Esmeralda</option><option>Zafiro</option><option>Rubí</option><option>Perla</option><option>Circonia</option><option>Amatista</option></select>
    </div>
    <div><label>Ordenar por</label>
      <select id="fOrden"><option value="reciente">Más reciente</option><option value="precioAsc">Precio: menor a mayor</option><option value="precioDesc">Precio: mayor a menor</option><option value="nombre">Nombre A-Z</option></select>
    </div>
    <div class="filters-clear"><button id="clearFilters" class="facet-sm">Limpiar filtros</button></div>

  <div id="gridArea"><div class="loading">Cargando el catálogo…</div></div>
</main>

<footer>Fema · Catálogo de joyería</footer>

<!-- Módulo de JavaScript para inicializar PhotoSwipe -->
<script type="module">
  import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5.4.3/dist/photoswipe-lightbox.esm.js';
  window.PhotoSwipeLightbox = PhotoSwipeLightbox;

<script>
/* ====== Configuración: pegá acá los datos de tu proyecto Supabase ====== */
const SUPABASE_URL = 'https://jjoibdpsoahybjnwfewz.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_a0HQkFV6Cdmdmk4y6qRE-g_5IlBM7RG';
/* ======================================================================= */

const WHATSAPP_NUMBER = '595982968591';
let joyas = [];
let supabaseClient = null;

if(SUPABASE_URL && SUPABASE_ANON_KEY){
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

function formatGs(n){ return 'Gs. ' + Number(n).toLocaleString('es-PY'); }

function buildWhatsAppLink(j, colorSeleccionado = '') {
  const nroTelefono = "595982968591"; // <-- Aquí va tu número de WhatsApp de FEMA
  
  // Si hay un color seleccionado, lo agregamos con un emoji delicado
  const detalleColor = colorSeleccionado ? `\n💖 *Color elegido:* ${colorSeleccionado}` : '';
  
  const mensaje = `¡Hola, FEMA! ✨ Me enamoré de esta hermosa joya y me encantaría saber si la tienen disponible:\n\n` +
                  `🌸 *Producto:* ${j.nombre}${detalleColor}\n` +
                  `✨ *Precio:* ${formatGs(j.precio)}\n\n` +
                  `¡Muchísimas gracias! 💕`;
                  
  return `https://wa.me/${nroTelefono}?text=${encodeURIComponent(mensaje)}`;
}
  
async function loadJoyas(){
  if(!supabaseClient){
    document.getElementById('gridArea').innerHTML = `<div class="setup">
      <h3>Conectá tu base de datos</h3>
      <p>Este catálogo todavía no está conectado a Supabase. Pegá tu <code>SUPABASE_URL</code> y <code>SUPABASE_ANON_KEY</code> al inicio del código (sección de configuración) para que las joyas empiecen a mostrarse acá.</p>
    </div>`;
    document.getElementById('resultCount').textContent = 'Sin conexión configurada';
    return;
  }
  const { data, error } = await supabaseClient.from('joyas').select('*').order('created_at', { ascending:false });
  if(error){
    document.getElementById('gridArea').innerHTML = `<div class="setup"><h3>No se pudo cargar el catálogo</h3><p>${error.message}</p></div>`;
    return;
  }
  joyas = data || [];
  render();
}

function getFiltered(){
  const q = document.getElementById('fSearch').value.trim().toLowerCase();
  const cat = document.getElementById('fCategoria').value;
  const mat = document.getElementById('fMaterial').value;
  const pied = document.getElementById('fPiedra').value;
  const orden = document.getElementById('fOrden').value;

  let list = joyas.filter(j=>{
    const nombreMatch = j.nombre.toLowerCase().includes(q);
    const descMatch = (j.descripcion||'').toLowerCase().includes(q);
    if(q && !(nombreMatch || descMatch)) return false;
    if(cat && j.categoria !== cat) return false;
    if(mat && j.material !== mat) return false;
    if(pied && j.piedra !== pied) return false;
    return true;
  });

  if(orden==='precioAsc') list.sort((a,b)=>a.precio-b.precio);
  else if(orden==='precioDesc') list.sort((a,b)=>b.precio-a.precio);
  else if(orden==='nombre') list.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  else list.sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));

  return list;
}

function render(){
  const list = getFiltered();
  const area = document.getElementById('gridArea');
  
  // Actualizar contador
  document.getElementById('resultCount').textContent =
    joyas.length === 0 ? 'Aún no hay piezas cargadas' : `${list.length} de ${joyas.length} pieza${joyas.length === 1 ? '' : 's'}`;

  if(list.length === 0){
    area.innerHTML = `<div class="empty">
      <h3>${joyas.length === 0 ? 'El catálogo está vacío por el momento' : 'Sin resultados'}</h3>
      <p>${joyas.length === 0 ? 'Volvé a visitarnos pronto.' : 'Probá ajustando los filtros de búsqueda.'}</p>
    </div>`;
    return;
  }

  // 1. Agrupar los productos filtrados por su categoría
  const categoriasAgrupadas = {};
  list.forEach(j => {
    const cat = j.categoria || 'Otros';
    if (!categoriasAgrupadas[cat]) {
      categoriasAgrupadas[cat] = [];
    }
    categoriasAgrupadas[cat].push(j);
  });

  // 2. Construir el HTML estructurado por filas horizontales
  let htmlFinal = '';
  
  for (const [nombreCategoria, productos] of Object.entries(categoriasAgrupadas)) {
    htmlFinal += `
      <div class="category-row">
        <h3 class="category-title">✨ Colección de ${escapeHtml(nombreCategoria)}</h3>
        <div class="horizontal-scroll-wrapper">
          ${productos.map(cardHtml).join('')}
        </div>
      </div>
    `;
  }

  area.innerHTML = htmlFinal;
}

// Cambia la foto principal visible en la tarjeta al dar clic en una miniatura
window.changeActivePhoto = function(btn, imgUrl, joyaId, index) {
  const card = btn.closest('.card');
  const mainImg = card.querySelector('.img-wrap');
  mainImg.style.backgroundImage = `url('${imgUrl}')`;
  mainImg.setAttribute('data-active-index', index);
  
  card.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}
// Maneja la selección del color variant
window.changeActiveColorPro = function(btn, colorName, imgUrl, joyaId, index) {
  // Asegurarnos de capturar el elemento span correcto si se hace clic en el texto
  const badge = btn.closest('.color-badge');
  if (!badge) return;

  const card = badge.closest('.card');
  if (!card) return;
  
  // 1. Activa la variante visual del color (cambia la tarjetita activa)
  card.querySelectorAll('.color-badge').forEach(b => b.classList.remove('active'));
  badge.classList.add('active');

  // 2. Guarda el color seleccionado en el botón de agregar al carrito
  const btnCarrito = card.querySelector('.btn-carrito-item');
  if(btnCarrito) btnCarrito.setAttribute('data-color', colorName);

  // 3. Actualiza el enlace de compra directa para WhatsApp
  const btnComprar = card.querySelector('.comprar');
  if(btnComprar) {
    const j = joyas.find(x => x.id.toString() === joyaId.toString());
    if(j) btnComprar.href = buildWhatsAppLink(j, colorName);
  }

  // 4. Leer los precios directo de los atributos data del badge
  const nuevoPrecio = Number(badge.getAttribute('data-precio')) || 0;
  const precioAnterior = badge.getAttribute('data-anterior') ? Number(badge.getAttribute('data-anterior')) : null;

  const oldPriceEl = card.querySelector('.old-price');
  const currPriceEl = card.querySelector('.current-price');
  const tagEl = document.getElementById(`tag-descuento-${joyaId}`);

  // 5. Actualizar los textos de precio dinámicamente en pantalla
  if(currPriceEl) currPriceEl.textContent = formatGs(nuevoPrecio);
  
  if(precioAnterior && precioAnterior > nuevoPrecio) {
    if(oldPriceEl) {
      oldPriceEl.textContent = formatGs(precioAnterior);
      oldPriceEl.style.display = 'inline-block';
    }
    if(tagEl) {
      const porcentaje = Math.round(((precioAnterior - nuevoPrecio) / precioAnterior) * 100);
      tagEl.textContent = `${porcentaje}% OFF`;
      tagEl.style.background = '#A85A70';
      tagEl.style.display = 'block';
    }
  } else {
    if(oldPriceEl) oldPriceEl.style.display = 'none';
    if(tagEl) {
      const joyaOriginal = joyas.find(x => x.id.toString() === joyaId.toString());
      if(joyaOriginal && joyaOriginal.destacado) {
        tagEl.textContent = 'Destacada';
        tagEl.style.background = '';
        tagEl.style.display = 'block';
      } else {
        tagEl.style.display = 'none';
      }
    }
  }

  // 6. Cambiar a la foto asociada a la variante
  if(imgUrl) {
    const thumbTarget = card.querySelector(`.thumb[data-index="${index}"]`);
    if(thumbTarget) {
      if (typeof changeActivePhoto === 'function') {
        changeActivePhoto(thumbTarget, imgUrl, joyaId, index);
      } else {
        card.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumbTarget.classList.add('active');
        const mainImg = card.querySelector('.img-wrap');
        if(mainImg) {
          mainImg.style.backgroundImage = `url('${imgUrl.replace(/'/g,"\\'")}')`;
          mainImg.setAttribute('data-active-index', index);
        }
      }
    } else {
      const mainImg = card.querySelector('.img-wrap');
      if(mainImg) {
        mainImg.style.backgroundImage = `url('${imgUrl.replace(/'/g,"\\'")}')`;
        mainImg.setAttribute('data-active-index', index);
      }
    }
  }
};

window.openGallery = function(joyaId, startIndex = 0) {
  const j = joyas.find(x => x.id.toString() === joyaId.toString());
  if(!j) return;
  
  let imgs = [];
  if (Array.isArray(j.imagen)) {
    imgs = j.imagen.filter(Boolean);
  } else if (typeof j.imagen === 'string' && j.imagen) {
    imgs = [j.imagen];
  }
  
  if(imgs.length === 0) return;
  
  // Ponemos el tamaño en 0 al inicio para que el filtro lo calcule dinámicamente
  const dataSource = imgs.map(url => ({
    src: url,
    w: 0,
    h: 0
  }));

  const lightbox = new window.PhotoSwipeLightbox({
    dataSource: dataSource,
    index: parseInt(startIndex) || 0,
    pswpModule: () => import('https://unpkg.com/photoswipe@5.4.3/dist/photoswipe.esm.js')
  });
  
  // Filtro inteligente: detecta el tamaño real de la imagen al cargarla para evitar que se deforme
  lightbox.addFilter('itemData', (itemData, index) => {
    const img = new Image();
    img.src = itemData.src;
    img.onload = () => {
      if (itemData.w === 0) {
        itemData.w = img.naturalWidth || 1200;
        itemData.h = img.naturalHeight || 1200;
        if (lightbox.pswp) {
          lightbox.pswp.refreshSlideContent(index);
        }
      }
    };
    return itemData;
  });
  
  lightbox.init();
  lightbox.loadAndOpen(parseInt(startIndex) || 0);
}

function cardHtml(j){
  let imgs = [];
  if (Array.isArray(j.imagen)) {
    imgs = j.imagen.filter(Boolean);
  } else if (typeof j.imagen === 'string' && j.imagen) {
    imgs = [j.imagen];
  }

  const firstImg = imgs[0] || '';
  const imgStyle = firstImg ? `style="background-image:url('${firstImg.replace(/'/g,"\\'")}')"` : '';
  
  let thumbsHtml = '';
  if (imgs.length > 1) {
    thumbsHtml = `<div class="thumbs-container">` + 
      imgs.map((img, idx) => {
        return `<div class="thumb ${idx === 0 ? 'active' : ''}" 
                     data-index="${idx}"
                     style="background-image:url('${img.replace(/'/g,"\\'")}')"
                     onclick="changeActivePhoto(this, '${img.replace(/'/g,"\\'")}', '${j.id}', ${idx})">
                </div>`;
      }).join('') + `</div>`;
  }

  // Lógica Avanzada de Variantes por Color (JSONB)
  let coloresLista = [];
  if (Array.isArray(j.colores)) {
    coloresLista = j.colores;
  }

  // Filtrar solo los colores que estén disponibles para la venta
  const coloresDisponibles = coloresLista.filter(c => c.disponible !== false);

  let colorsHtml = '';
  let colorInicial = '';
  let precioActual = j.precio;
  let precioAnteriorActual = null;

  if (coloresDisponibles.length > 0) {
    colorInicial = coloresDisponibles[0].nombre;
    precioActual = coloresDisponibles[0].precio_extraordinario || j.precio; 
    precioAnteriorActual = coloresDisponibles[0].precio_anterior;

    colorsHtml = `<div class="color-variants"><span class="color-label">Color:</span>`;
    colorsHtml += coloresDisponibles.map((col, idx) => {
      const imgAsociada = imgs[idx] || firstImg;
      // Guardamos los datos de oferta del color en atributos data- para leerlos con JS al hacer clic
return `<span class="color-badge facet-sm ${idx === 0 ? 'active' : ''}" 
                  data-precio="${j.precio}"
                  data-anterior="${col.precio_anterior || ''}"
                  onclick="changeActiveColorPro(this, '${escapeHtml(col.nombre)}', '${imgAsociada.replace(/'/g,"\\'")}', '${j.id}', ${idx})">
              ${escapeHtml(col.nombre)}
            </span>`;
    }).join('');
    colorsHtml += `</div>`;
  }

  // Si no hay ningún color disponible en la lista pero la lista no está vacía, ocultamos el producto
  if (coloresLista.length > 0 && coloresDisponibles.length === 0) {
    return ''; 
  }

  // Calcular etiqueta de descuento inicial basada en el primer color disponible
  let etiquetaHtml = '';
  if (precioAnteriorActual && Number(precioAnteriorActual) > Number(precioActual)) {
    const porcentaje = Math.round(((precioAnteriorActual - precioActual) / precioAnteriorActual) * 100);
    etiquetaHtml = `<div class="destacado" id="tag-descuento-${j.id}" style="background: #A85A70;">${porcentaje}% OFF</div>`;
  } else if (j.destacado) {
    etiquetaHtml = `<div class="destacado" id="tag-descuento-${j.id}">Destacada</div>`;
  } else {
    etiquetaHtml = `<div class="destacado" id="tag-descuento-${j.id}" style="display:none;"></div>`;
  }

  // Renderizar bloque de precios dinámico
  let contenedorPrecio = '';
  if (precioAnteriorActual && Number(precioAnteriorActual) > Number(precioActual)) {
    contenedorPrecio = `
      <div class="price-container-${j.id}" style="border-top: 1px solid var(--linea); padding-top: 10px;">
        <span class="old-price" style="font-size: 14px; text-decoration: line-through; color: var(--texto-suave); margin-right: 8px; font-style: normal;">
          ${formatGs(precioAnteriorActual)}
        </span>
        <span class="current-price" style="font-weight: 500;">${formatGs(precioActual)}</span>
      </div>`;
  } else {
    contenedorPrecio = `
      <div class="price-container-${j.id}" style="border-top: 1px solid var(--linea); padding-top: 10px;">
        <span class="old-price" style="font-size: 14px; text-decoration: line-through; color: var(--texto-suave); margin-right: 8px; font-style: normal; display:none;"></span>
        <span class="current-price" style="font-weight: 500;">${formatGs(precioActual)}</span>
      </div>`;
  }

  return `
  <div class="card facet">
    ${etiquetaHtml}
    
    <div class="img-wrap" 
         id="main-img-${j.id}"
         data-active-index="0"
         onclick="openGallery('${j.id}', this.getAttribute('data-active-index'))" 
         ${imgStyle}>
         ${firstImg ? '' : 'Sin imagen'}
    </div>
    
    ${thumbsHtml}
    ${colorsHtml}
    
    <div class="body">
      <div class="cat">${j.categoria}</div>
      <h3>${escapeHtml(j.nombre)}</h3>
      <div class="attrs">
        ${j.material}${j.piedra && j.piedra!=='Ninguna' ? ' · '+j.piedra : ''}
        ${j.talla ? '<br>Talla/medida: '+escapeHtml(j.talla) : ''}
        ${j.peso ? '<br>Peso: '+j.peso+' g' : ''}
      </div>
      
      ${contenedorPrecio}
      
      <button class="btn-carrito-item" 
              id="btn-cart-${j.id}"
              onclick="agregarAlCarrito('${j.id}')" 
              data-color="${colorInicial}"
              style="width: 100%; padding: 10px; margin-bottom: 8px; border: none; border-radius: 8px; background-color: #d4af37; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;">
        🛒 Agregar al Carrito
      </button>

      <a class="comprar" id="btn-direct-${j.id}" href="${buildWhatsAppLink(j, colorInicial)}" target="_blank" rel="noopener" style="margin-top: 0;">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.6-.8-1.9-.9-.2-.1-.4-.1-.6.1-.2.3-.7.9-.8 1-.1.2-.3.2-.6.1-2.2-1.1-3.2-2.2-4.2-4.2-.1-.3-.1-.5.1-.6.2-.2.5-.5.6-.8.1-.2 0-.4-.1-.6-.1-.1-.6-1.5-.8-1.9-.2-.4-.4-.3-.6-.3h-.6c-.2 0-.5.1-.7.4-1 1.2-1.4 1.6-1.5 1.9-.2.3-.4 1.4.2 3.2 1.2 3.8 3.2 5.1 4.2 5.6.8.4 1.6.4 2.2.3.7-.1 2.2-.9 2.5-1.7.3-.8.3-1.5.2-1.6z"/></svg>
        Comprar directo
      </a>
    </div>
  </div>`;
}
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

['fSearch','fCategoria','fMaterial','fPiedra','fOrden'].forEach(id=>{
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});

document.getElementById('clearFilters').addEventListener('click', ()=>{
  document.getElementById('fSearch').value='';
  document.getElementById('fCategoria').value='';
  document.getElementById('fMaterial').value='';
  document.getElementById('fPiedra').value='';
  document.getElementById('fOrden').value='reciente';
  render();
});

// Carga las joyas y verifica si se solicitó un ID específico por la URL
loadJoyas().then(() => {
  const urlParams = new URLSearchParams(window.location.search);
  const productId = urlParams.get('id');
  
  if (productId) {
    // Buscamos si la joya con ese ID realmente existe en nuestro catálogo cargado
    const joyaEncontrada = joyas.find(j => j.id.toString() === productId.toString());
    
    if (joyaEncontrada) {
      // Filtramos la grilla para mostrar únicamente esta joya
      const area = document.getElementById('gridArea');
      area.innerHTML = `
        <div style="margin-bottom: 24px; text-align: left;">
          <button onclick="window.location.href=window.location.pathname" class="facet-sm" style="padding: 8px 16px; font-size: 11px;">
            ✨ Ver todo el catálogo
          </button>
        </div>
        <div class="grid">${cardHtml(joyaEncontrada)}</div>
      `;
      
      // Actualizamos el contador para reflejar que estamos viendo un detalle
      document.getElementById('resultCount').textContent = `Mostrando detalle de: ${joyaEncontrada.nombre}`;
    }
  }
});

// --- LÓGICA DEL CARRITO DE COMPRAS CORREGIDA ---
let carrito = [];

// Agregar un producto al carrito
// Agregar un producto al carrito guardando su variante de color
window.agregarAlCarrito = function(joyaId) {
  const j = joyas.find(x => x.id.toString() === joyaId.toString());
  if(!j) return;

  // Obtenemos el color seleccionado del atributo data-color
  const cardElement = document.getElementById(`main-img-${j.id}`).closest('.card');
  const btnCarrito = cardElement.querySelector('.btn-carrito-item');
  const colorElegido = btnCarrito ? btnCarrito.getAttribute('data-color') : '';

  // Buscamos si ya existe la joya con ESE COLOR en el carrito
  const itemEnCarrito = carrito.find(x => x.id.toString() === joyaId.toString() && x.color === colorElegido);

  if (itemEnCarrito) {
    itemEnCarrito.cantidad += 1;
  } else {
    // Buscamos si hay una imagen correspondiente al índice del color
    let imagenUrl = 'https://via.placeholder.com/150';
    let imgs = [];
    if (Array.isArray(j.imagen)) imgs = j.imagen.filter(Boolean);
    else if (typeof j.imagen === 'string' && j.imagen) imgs = [j.imagen];

    if (j.colores) {
      let rawColores = Array.isArray(j.colores) ? j.colores : j.colores.split(',').map(c => c.trim());
      let idxColor = rawColores.indexOf(colorElegido);
      imagenUrl = imgs[idxColor] || imgs[0] || imagenUrl;
    } else {
      imagenUrl = imgs[0] || imagenUrl;
    }

    carrito.push({
      id: j.id,
      nombre: j.nombre || 'Joya sin nombre',
      precio: j.precio || 0,
      imagen: imagenUrl,
      color: colorElegido,
      cantidad: 1
    });
  }

  actualizarContadorCarrito();
  alert(`¡${j.nombre}${colorElegido ? ' (' + colorElegido + ')' : ''} agregado al carrito!`);
};

// Actualiza el número rojo del botón flotante
function actualizarContadorCarrito() {
  const totalItems = carrito.reduce((acc, item) => acc + item.cantidad, 0);
  const badge = document.getElementById('carrito-badge');
  if (badge) {
    badge.innerText = totalItems;
    badge.style.display = totalItems > 0 ? 'block' : 'none';
  }
}

// Abrir el carrito deslizante
window.mostrarCarrito = function() {
  const offcanvasElement = document.getElementById('offcanvas-carrito');
  const lista = document.getElementById('lista-carrito');
  const totalElen = document.getElementById('total-carrito');
  
  if(!offcanvasElement || !lista) return;

  lista.innerHTML = '';
  let total = 0;

  if (carrito.length === 0) {
    lista.innerHTML = '<p class="text-center text-muted my-5">Tu carrito está vacío.</p>';
  } else {
    carrito.forEach(item => {
      const subtotal = item.precio * item.cantidad;
      total += subtotal;

      const fila = document.createElement('div');
      fila.className = 'd-flex align-items-center justify-content-between mb-3 pb-3 border-bottom';
      fila.innerHTML = `
        <div class="d-flex align-items-center" style="max-width: 60%;">
          <img src="${item.imagen}" alt="${item.nombre}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 12px; flex-shrink: 0;">
          <div style="min-width: 0;">
            <h6 class="mb-0 fw-bold text-truncate" style="font-size: 0.9rem;">${item.nombre}</h6>
            <small class="text-muted" style="font-size: 0.8rem;">${item.precio.toLocaleString('es-PY')} Gs.</small>
          </div>
        </div>
        <div class="d-flex align-items-center">
          <div class="input-group input-group-sm" style="width: 80px;">
            <button class="btn btn-outline-secondary px-2 py-0" onclick="cambiarCantidad('${item.id}', -1)">-</button>
            <span class="form-control text-center p-0 fw-bold bg-light d-flex align-items-center justify-content-center" style="font-size: 0.85rem; height: 26px;">${item.cantidad}</span>
            <button class="btn btn-outline-secondary px-2 py-0" onclick="cambiarCantidad('${item.id}', 1)">+</button>
          </div>
          <span class="ms-2 fw-bold text-end text-dark" style="min-width: 85px; font-size: 0.85rem;">${subtotal.toLocaleString('es-PY')} Gs.</span>
        </div>
      `;
      lista.appendChild(fila);
    });
  }

  if(totalElen) totalElen.innerText = total.toLocaleString('es-PY') + ' Gs.';
  
  // Abrimos el menú lateral usando Bootstrap Offcanvas de forma nativa
  const bsOffcanvas = new bootstrap.Offcanvas(offcanvasElement);
  bsOffcanvas.show();
};

// Cambiar cantidades
// Cambiar cantidades y refrescar el total de manera dinámica
window.cambiarCantidad = function(id, cambio) {
  const item = carrito.find(x => x.id.toString() === id.toString());
  if (!item) return;

  item.cantidad += cambio;

  if (item.cantidad <= 0) {
    carrito = carrito.filter(x => x.id.toString() !== id.toString());
  }

  actualizarContadorCarrito();
  
  // REGENERACIÓN CORREGIDA: Ahora llama a enviarCarritoWhatsApp()
  const lista = document.getElementById('lista-carrito');
  const totalElen = document.getElementById('total-carrito');
  if(lista) {
    lista.innerHTML = '';
    let total = 0;
    if (carrito.length === 0) {
      lista.innerHTML = '<p class="text-center text-muted my-5">Tu carrito está vacío.</p>';
    } else {
      carrito.forEach(item => {
        const subtotal = item.precio * item.cantidad;
        total += subtotal;
        const fila = document.createElement('div');
        fila.className = 'd-flex align-items-center justify-content-between mb-3 pb-3 border-bottom';
        fila.innerHTML = `
          <div class="d-flex align-items-center" style="max-width: 60%;">
            <img src="${item.imagen}" alt="${item.nombre}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 12px; flex-shrink: 0;">
            <div style="min-width: 0;">
              <h6 class="mb-0 fw-bold text-truncate" style="font-size: 0.9rem;">${item.nombre}</h6>
              <small class="text-muted" style="font-size: 0.8rem;">${item.precio.toLocaleString('es-PY')} Gs.</small>
            </div>
          </div>
          <div class="d-flex align-items-center">
            <div class="input-group input-group-sm" style="width: 80px;">
              <button class="btn btn-outline-secondary px-2 py-0" onclick="cambiarCantidad('${item.id}', -1)">-</button>
              <span class="form-control text-center p-0 fw-bold bg-light d-flex align-items-center justify-content-center" style="font-size: 0.85rem; height: 26px;">${item.cantidad}</span>
              <button class="btn btn-outline-secondary px-2 py-0" onclick="cambiarCantidad('${item.id}', 1)">+</button>
            </div>
            <span class="ms-2 fw-bold text-end text-dark" style="min-width: 85px; font-size: 0.85rem;">${subtotal.toLocaleString('es-PY')} Gs.</span>
          </div>
        `;
        lista.appendChild(fila);
      });
    }
    if(totalElen) totalElen.innerText = total.toLocaleString('es-PY') + ' Gs.';
  }
};
// --- REDIRECCIÓN ESTÉTICA, AMIGABLE Y FEMENINA A WHATSAPP ---
window.enviarCarritoWhatsApp = function() {
  if (carrito.length === 0) return;
  const nroTelefono = "595982968591"; // <-- Tu número de WhatsApp de FEMA
  
  // Obtenemos la URL base de tu web de GitHub Pages de forma dinámica
  const urlBaseWeb = window.location.origin + window.location.pathname;

  let mensaje = `¡Hola, FEMA! ✨ Acabo de armar mi carrito de deseos en la web y me encantaría coordinar mi pedido de estas hermosuras:\n\n`;
  
  let total = 0;
  carrito.forEach((item, index) => {
    const colorDetalle = item.color ? ` (Color: ${item.color})` : '';
    const subtotal = item.precio * item.cantidad;
    total += subtotal;
    
    // Creamos el enlace directo al producto agregando su ID a la URL
    const enlaceProducto = `${urlBaseWeb}?id=${item.id}`;
    
    mensaje += `${index + 1} 🌸 *${item.nombre}*${colorDetalle}\n` +
               `   Cantidad: ${item.cantidad} x ${formatGs(item.precio)}\n` +
               `   🔗 *Ver detalle:* ${enlaceProducto}\n\n`;
  });
  
  mensaje += `💖 *Total de mi pedido:* ${formatGs(total)}\n\n` +
             `¿Me confirman si tienen disponibilidad para coordinar la entrega? ¡Muchas gracias! 💕`;
  
  const url = `https://wa.me/${nroTelefono}?text=${encodeURIComponent(mensaje)}`;
  window.open(url, '_blank');
};
  
</script>
